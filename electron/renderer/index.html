<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lawgic EU Law Retrieve</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Lawgic &middot; EU Law Retrieve</span>
    </div>
    <button id="btn-settings" class="icon-btn" title="Settings">&#9881;</button>
  </header>

  <main>
    <section class="panel controls">
      <div class="row">
        <label>Language</label>
        <select id="sel-language">
          <option value="en" selected>English (active)</option>
          <option value="el" disabled>Greek (phase 2 &mdash; schema slot reserved)</option>
          <option value="de" disabled>German (future)</option>
          <option value="fr" disabled>French (future)</option>
          <option value="it" disabled>Italian (future)</option>
        </select>

        <label>Scope</label>
        <select id="sel-scope">
          <option value="priority" selected>Priority domains (MVP)</option>
          <option value="all">All in-force</option>
        </select>
      </div>

      <div class="row buttons">
        <button id="btn-status">Refresh status</button>
        <button id="btn-incremental" class="primary">Run incremental update</button>
        <button id="btn-add-lang" disabled title="Enable after Phase 2">Add new language</button>
        <button id="btn-estimate">Estimate cost</button>
        <button id="btn-stop" disabled>Stop</button>
      </div>
    </section>

    <section class="panel status">
      <h2>Status</h2>
      <div id="status-grid" class="status-grid">
        <div class="muted">Click <em>Refresh status</em> to load counts from EULawIngestionStatus.</div>
      </div>
    </section>

    <section class="panel activity">
      <h2>Recent activity</h2>
      <div id="activity" class="activity-feed"></div>
    </section>

    <section class="panel dev">
      <h2>Developer</h2>
      <div class="row buttons">
        <button id="btn-verify-cache">Verify DashScope cache</button>
        <button id="btn-eval">Run extraction eval (20 docs)</button>
      </div>
    </section>
  </main>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-card">
      <header>
        <h2>Settings</h2>
        <button id="btn-close-settings" class="icon-btn">&times;</button>
      </header>
      <form id="settings-form">
        <fieldset>
          <legend>API Keys</legend>
          <label>DashScope (Alibaba, primary)
            <input type="password" name="dashscope_api_key" autocomplete="off">
          </label>
          <label>Voyage AI
            <input type="password" name="voyage_api_key" autocomplete="off">
          </label>
          <label>Google AI Studio (fallback)
            <input type="password" name="google_ai_studio_key" autocomplete="off">
          </label>
        </fieldset>

        <fieldset>
          <legend>Endpoints</legend>
          <label>Weaviate host
            <input type="text" name="weaviate_host" placeholder="https://lawgicfeb26.weaviate.network">
          </label>
          <label>Weaviate API key
            <input type="password" name="weaviate_api_key" autocomplete="off">
          </label>
          <label>Postgres DATABASE_URL
            <input type="password" name="database_url" placeholder="postgres://..." autocomplete="off">
          </label>
          <label>DashScope Base URL
            <input type="text" name="dashscope_base_url"
                   placeholder="https://dashscope-intl.aliyuncs.com/compatible-mode/v1">
          </label>
        </fieldset>

        <fieldset>
          <legend>Models</legend>
          <label>Extraction
            <select name="model_extraction">
              <option value="qwen3.5-flash" selected>qwen3.5-flash (default)</option>
            </select>
          </label>
          <label>Reasoning (case law holdings)
            <select name="model_reasoning">
              <option value="qwen3.6-plus" selected>qwen3.6-plus (default)</option>
            </select>
          </label>
          <label>Fallback
            <select name="model_fallback">
              <option value="gemini-2.5-flash" selected>gemini-2.5-flash (default)</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Advanced</legend>
          <label>LLM concurrency (QPS)
            <input type="number" name="llm_concurrency" min="1" max="50" value="3">
          </label>
        </fieldset>

        <footer>
          <button type="button" id="btn-cancel-settings">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </footer>
      </form>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
